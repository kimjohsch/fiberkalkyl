let active = fiber;
let cart = JSON.parse(localStorage.getItem('calc')||'[]');

function switchCalc(){ let v=document.getElementById('type').value; active = v==='fiber'?fiber:copper; renderCats(); renderCart(); }

function addItem(cat,index){
 let item = active[cat][index];
 let p = prompt('Justera pris om du vill:', item.price);
 if(!p) p=item.price;
 let qty = parseFloat(prompt('Mängd ('+item.unit+'):',1)); if(!qty) return;
 cart.push({name:item.name,price:parseFloat(p),unit:item.unit,qty:qty}); save(); renderCart(); }

function removeItem(i){ cart.splice(i,1); save(); renderCart(); }
function save(){ localStorage.setItem('calc',JSON.stringify(cart)); }

function renderCats(){
 let d='';
 for(let c in active){
  d+=`<div class='box'><h3>${c}</h3><ul>`;
  active[c].forEach((a,i)=> d+=`<li>${a.name} – ${a.price} kr/${a.unit} <button onclick="addItem('${c}',${i})">Lägg till</button></li>`);
  d+='</ul></div>';
 }
 document.getElementById('cats').innerHTML=d;
}

function renderCart(){
 let d=''; let sum=0;
 cart.forEach((a,i)=>{
  let tot=a.price*a.qty; sum+=tot;
  d+=`<li>${a.name}: ${a.qty} ${a.unit} á ${a.price} = ${tot.toFixed(2)} kr <button onclick="removeItem(${i})">X</button></li>`;
 });
 document.getElementById('cart').innerHTML=d;
 document.getElementById('sum').innerText=sum.toFixed(2)+' kr';
}
</script>

</div>
