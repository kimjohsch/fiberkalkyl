<!DOCTYPE html><html lang="sv"><head><meta charset="UTF-8"><title>Kalkyl Fiber/Koppar – SINGLE FILE FULL</title><style>body{font-family:Arial;background:#e8f0ff;padding:20px;}h1{color:#003f8c;}table{width:100%;border-collapse:collapse;margin-top:10px;}th,td{border:1px solid #ccc;padding:6px;background:white;}button{padding:6px 12px;margin:4px;}select,input{padding:5px;margin:3px;}#editor{background:#d9e7ff;padding:10px;margin-top:20px;}</style></head><body><h1>Kalkyl Fiber/Koppar – FULL SINGLE FILE</h1><div id="app"></div><script>let articles=[{name:"OM4 fiberkabel",unit:"m",price:12.50,type:"fiber"},{name:"OS2 fiberkabel",unit:"m",price:8.90,type:"fiber"},{name:"Cat6 kopparkabel",unit:"m",price:6.90,type:"koppar"},{name:"Cat6A kopparkabel",unit:"m",price:9.20,type:"koppar"},{name:"ODF 12",unit:"st",price:1450,type:"fiber"},{name:"ODF 24",unit:"st",price:2200,type:"fiber"},{name:"Patchpanel Cat6",unit:"st",price:590,type:"koppar"},{name:"Patchpanel Cat6A",unit:"st",price:790,type:"koppar"},{name:"Skarvbox fiber",unit:"st",price:980,type:"fiber"},{name:"Kanalisation 40mm",unit:"m",price:18,type:"fiber"},{name:"Mediakonverter",unit:"st",price:890,type:"fiber"}];let rows=[];function render(){let app=document.getElementById('app');app.innerHTML='';app.innerHTML+=`<div><button onclick="addRow()">Lägg till rad</button><button onclick="saveNamed()">Spara som</button><button onclick="loadNamed()">Ladda</button><button onclick="resetCalc()">Reset</button><button onclick="exportPDF()">PDF</button></div>`;app.innerHTML+=`<h3>Fiber/Koppar</h3><select id='techSel' onchange='render()'><option value='fiber'>Fiber</option><option value='koppar'>Koppar</option></select><h3>Nätklass</h3><select id='netSel' onchange='render()'><option value='gult'>Gult nät</option><option value='rött'>Rött nät</option></select>`;let table=document.createElement('table');table.innerHTML='<tr><th>Artikel</th><th>Antal</th><th>Enhet</th><th>Pris</th><th>Summa</th><th></th></tr>';let tech=document.getElementById('techSel').value;let filtered=articles.filter(a=>a.type===tech);let total=0;rows.forEach((r,i)=>{let tr=document.createElement('tr');let opts=filtered.map(a=>`<option value="${a.name}" ${a.name===r.article?'selected':''}>${a.name}</option>`).join('');tr.innerHTML=`<td><select onchange="updateArt(${i},this.value)"><option value=''>Välj</option>${opts}</select></td><td><input type='number' value='${r.qty}' onchange="updateQty(${i},this.value)"></td><td>${r.unit||''}</td><td>${r.price.toLocaleString('sv-SE',{minimumFractionDigits:2})} kr</td><td>${(r.qty*r.price).toLocaleString('sv-SE',{minimumFractionDigits:2})} kr</td><td><button onclick="delRow(${i})">X</button></td>`;total+=r.qty*r.price;table.appendChild(tr);});app.appendChild(table);app.innerHTML+=`<h2>Total: ${total.toLocaleString('sv-SE',{minimumFractionDigits:2})} kr</h2>`;renderEditor();}window.addRow=()=>{rows.push({article:'',qty:0,unit:'',price:0});render();};window.delRow=i=>{rows.splice(i,1);render();};window.updateArt=(i,name)=>{let a=articles.find(x=>x.name===name);if(!a){rows[i]={article:'',qty:0,unit:'',price:0};render();return;}rows[i].article=a.name;rows[i].unit=a.unit;rows[i].price=a.price;render();};window.updateQty=(i,v)=>{rows[i].qty=Number(v);render();};window.resetCalc=()=>{rows=[];render();};window.saveNamed=()=>{let n=prompt('Namn:');if(!n)return;localStorage.setItem('calc_'+n,JSON.stringify(rows));alert('Sparad');};window.loadNamed=()=>{let keys=Object.keys(localStorage).filter(k=>k.startsWith('calc_'));let n=prompt('Tillgängliga:
'+keys.join('
'));if(!n)return;rows=JSON.parse(localStorage.getItem(n));render();};function exportPDF(){let w=window.open('');let html='<h1>Kalkyl</h1>';rows.forEach(r=>{html+=`<p>${r.article} — ${r.qty} ${r.unit} ${(r.qty*r.price).toFixed(2)} kr</p>`;});w.document.write(html);w.print();}function renderEditor(){let div=document.createElement('div');div.id='editor';div.innerHTML='<h3>Artikelregister</h3>';articles.forEach((a,i)=>{div.innerHTML+=`<div>${a.name} (${a.unit}) ${a.price} kr <button onclick="removeArt(${i})">Ta bort</button></div>`;});div.innerHTML+=`<h4>Ny artikel</h4>Namn: <input id='na'> Enhet: <input id='un'> Pris: <input id='pr'><select id='ty'><option value='fiber'>Fiber</option><option value='koppar'>Koppar</option></select><button onclick='addArt()'>Lägg till</button>`;document.getElementById('app').appendChild(div);}window.addArt=()=>{let n=document.getElementById('na').value;let u=document.getElementById('un').value;let p=Number(document.getElementById('pr').value);let t=document.getElementById('ty').value;if(!n||!u||!p)return;articles.push({name:n,unit:u,price:p,type:t});render();};window.removeArt=i=>{articles.splice(i,1);render();};window.onload=render;</script></body></html>
