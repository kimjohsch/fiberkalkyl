
<!DOCTYPE html><html lang='sv'><head><meta charset='UTF-8'>
<title>Fiberkalkyl V3</title>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<link rel='manifest' href='manifest.json'>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js');}</script>
<style>
 body{font-family:Arial;background:#f8f9fc;margin:0;padding:20px;}
 h2{color:#1a4fb3;margin-bottom:20px;}
 .nav{display:flex;gap:10px;margin-bottom:20px;}
 button{background:#1a4fb3;color:white;border:none;padding:10px 15px;border-radius:6px;}
 .card{background:white;padding:15px;border-radius:8px;box-shadow:0 0 5px #ccc;margin-bottom:20px;}
 .input{width:100%;padding:8px;margin:6px 0;border:1px solid #ccc;border-radius:6px;}
 table{width:100%;border-collapse:collapse;}
 td,th{padding:6px;border-bottom:1px solid #ddd;}
 .pdf{background:#28a745;}
</style></head><body>
<h2>Fiberkalkyl – Version 3</h2>
<div class='nav'>
<button onclick="show('fiber')">Fiberinstallation</button>
<button onclick="show('koppar')">Koppardata</button>
<button onclick="show('reg')">Materialregister</button>
<button class='pdf' onclick="exportPDF()">Exportera PDF</button>
</div>
<div id='fiber' class='card'>
<h3>Fiberinstallation</h3>
<label>Meter fiber:</label><input class='input' id='fiber_m'>
<label>Pris/m:</label><input class='input' id='fiber_pris'>
</div>
<div id='koppar' class='card' style='display:none;'>
<h3>Koppardata</h3>
<label>Meter Cat6a:</label><input class='input' id='cat_m'>
<label>Pris/m:</label><input class='input' id='cat_pris'>
</div>
<div id='reg' class='card' style='display:none;'>
<h3>Materialregister</h3>
<table><tr><th>Artikel</th><th>E-nummer</th><th>Pris</th></tr>
<tr><td>12F Fiberkabel</td><td>5012345</td><td>12 kr/m</td></tr>
<tr><td>Cat6a kabel</td><td>2023456</td><td>5 kr/m</td></tr>
</table>
</div>
<script>
function show(x){['fiber','koppar','reg'].forEach(id=>document.getElementById(id).style.display='none');document.getElementById(x).style.display='block';}
function exportPDF(){alert('PDF-export kommer i nästa version.');}
</script>
</body></html>
