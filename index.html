
<!DOCTYPE html><html><head><meta charset='UTF-8'>
<title>Fiberkalkyl v9 PRO</title>
<link rel='manifest' href='manifest.json'>
<script>navigator.serviceWorker.register('sw.js');</script>
<style>
body{font-family:Arial;background:#eef3ff;margin:0}
.top{background:#0A74DA;padding:15px;color:white;display:flex;gap:20px}
.box{background:white;margin:15px;padding:15px;border-radius:8px;box-shadow:0 0 8px rgba(0,0,0,0.1)}
button{background:#0A74DA;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer}
input,select{padding:6px;margin:4px}
</style></head><body>
<div class='top'>
<button onclick="show('calc')">Kalkyl</button>
<button onclick="show('reg')">Artikelregister</button>
<button onclick="show('tasks')">Arbetsmoment</button>
<button onclick='exportPDF()'>PDF</button>
<button onclick='resetAll()'>RESET</button>
</div>
<div id='calc' class='box'>
<h3>Kalkyl</h3>
<select id='catSelect'></select>
<select id='artSelect'></select>
<input id='qty' type='number' placeholder='Mängd'>
<button onclick='addItem()'>Lägg till</button>
<ul id='calcList'></ul>
<h3>Total: <span id='sum'></span></h3></div>

<div id='reg' class='box' style='display:none'>
<h3>Artikelregister (redigerbart)</h3>
<ul id='regList'></ul>
</div>

<div id='tasks' class='box' style='display:none'>
<h3>Arbetsmoment</h3>
<input id='taskName' placeholder='Namn'>
<input id='taskTime' type='number' placeholder='Tid (min)'>
<input id='taskRate' type='number' placeholder='Timpris (kr)'>
<button onclick='addTask()'>Lägg till</button>
<ul id='taskList'></ul>
<h3>Arbetstid kostnad: <span id='workSum'></span></h3>
</div>

<script>
let articles={};
let cart=JSON.parse(localStorage.getItem('calc')||'[]');
let tasks=JSON.parse(localStorage.getItem('tasks')||'[]');

function show(x){['calc','reg','tasks'].forEach(id=>document.getElementById(id).style.display='none'); document.getElementById(x).style.display='block'}

fetch('articles.json').then(r=>r.json()).then(j=>{articles=j;loadUI()});

function loadUI(){ let cs=document.getElementById('catSelect'); cs.innerHTML=''; let all=Object.keys(articles.fiber).concat(Object.keys(articles.copper)); all.forEach(c=>{let o=document.createElement('option');o.text=c;cs.add(o)}); updateArts(); renderCalc(); renderReg(); renderTasks(); }

function updateArts(){ let cat=document.getElementById('catSelect').value; let arr=(articles.fiber[cat]||articles.copper[cat]||[]); let as=document.getElementById('artSelect'); as.innerHTML=''; arr.forEach((a,i)=>{let o=document.createElement('option');o.text=a.name;o.value=JSON.stringify({cat:cat,index:i});as.add(o)}); }
document.getElementById('catSelect').onchange=updateArts;

function addItem(){ let sel=JSON.parse(document.getElementById('artSelect').value); let a=(articles.fiber[sel.cat]||articles.copper[sel.cat])[sel.index]; let q=parseFloat(document.getElementById('qty').value); if(!q)return; cart.push({name:a.name,unit:a.unit,price:a.price,qty:q}); save(); renderCalc() }

function renderCalc(){ let ul=document.getElementById('calcList'); ul.innerHTML=''; let sum=0; cart.forEach((a,i)=>{ let t=a.price*a.qty; sum+=t; ul.innerHTML+=`<li>${a.name} <input value='${a.qty}' onchange='editQty(${i},this.value)'/> <input value='${a.price}' onchange='editPrice(${i},this.value)'/> <button onclick='delItem(${i})'>X</button></li>`}); document.getElementById('sum').innerText=sum.toFixed(2) }
function editQty(i,v){cart[i].qty=parseFloat(v); save(); renderCalc()}
function editPrice(i,v){cart[i].price=parseFloat(v); save(); renderCalc()}
function delItem(i){cart.splice(i,1); save(); renderCalc()}

function renderReg(){ let ul=document.getElementById('regList'); ul.innerHTML=''; Object.entries(articles).forEach(([type,cats])=>{ Object.entries(cats).forEach(([cat,arr])=>{ arr.forEach((a,i)=>{ ul.innerHTML+=`<li>${type}/${cat}: <input value='${a.name}' onchange='regEdit("${type}","${cat}",${i},"name",this.value)'/> <input value='${a.price}' onchange='regEdit("${type}","${cat}",${i},"price",this.value)'/> <input value='${a.unit}' onchange='regEdit("${type}","${cat}",${i},"unit",this.value)'/></li>` }) }) }) }
function regEdit(type,cat,i,key,val){ articles[type][cat][i][key]=val; saveRegistry() }
function saveRegistry(){ fetch('articles.json',{method:'PUT',body:JSON.stringify(articles)}); localStorage.setItem('articles',JSON.stringify(articles)) }

function addTask(){ let n=document.getElementById('taskName').value; let m=parseFloat(document.getElementById('taskTime').value); let r=parseFloat(document.getElementById('taskRate').value); if(!n||!m||!r)return; tasks.push({name:n,min:m,rate:r}); save(); renderTasks() }
function renderTasks(){ let ul=document.getElementById('taskList'); ul.innerHTML=''; let ws=0; tasks.forEach((t,i)=>{ let cost=(t.min/60)*t.rate; ws+=cost; ul.innerHTML+=`<li>${t.name} <input value='${t.min}' onchange='editTaskMin(${i},this.value)'/> <input value='${t.rate}' onchange='editTaskRate(${i},this.value)'/> = ${cost.toFixed(2)} <button onclick='delTask(${i})'>X</button></li>` }); document.getElementById('workSum').innerText=ws.toFixed(2) }
function editTaskMin(i,v){tasks[i].min=parseFloat(v); save(); renderTasks()}
function editTaskRate(i,v){tasks[i].rate=parseFloat(v); save(); renderTasks()}
function delTask(i){tasks.splice(i,1); save(); renderTasks()}

function resetAll(){ cart=[]; tasks=[]; save(); renderCalc(); renderTasks() }

function save(){ localStorage.setItem('calc',JSON.stringify(cart)); localStorage.setItem('tasks',JSON.stringify(tasks)) }

function exportPDF(){ alert('PDF export placeholder – full layout can be added.') }
</script>
</body></html>
