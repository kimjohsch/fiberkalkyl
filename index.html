
<!DOCTYPE html>
<html><head><meta charset='UTF-8'>
<title>Fiberkalkyl v7</title>
<link rel='manifest' href='manifest.json'>
<script>navigator.serviceWorker.register('sw.js');</script>
<style>
body{font-family:Arial;margin:20px;background:#f5f5f5}
.box{background:#fff;padding:15px;margin:10px 0;border-radius:8px}
</style>
</head><body>
<h2>Fiberkalkyl v7</h2>
<button onclick='exportJSON()'>Exportera kalkyl</button>
<input type='file' onchange='importJSON(event)'>
<div class='box'>
<h3>Arbetsmoment</h3>
<input id='taskName' placeholder='Moment'>
<input id='taskTime' placeholder='Tid (min)' type='number'>
<button onclick='addTask()'>Lägg till</button>
<ul id='taskList'></ul>
</div>
<div class='box'>
<h3>Material</h3>
<ul id='cart'></ul>
<h3>Total: <span id='sum'></span></h3>
</div>
<script>
let cart = JSON.parse(localStorage.getItem('calc')||'[]');
let tasks = JSON.parse(localStorage.getItem('tasks')||'[]');
function save(){ localStorage.setItem('calc',JSON.stringify(cart)); localStorage.setItem('tasks',JSON.stringify(tasks)); }
function addTask(){ let n=document.getElementById('taskName').value; let t=parseInt(document.getElementById('taskTime').value); if(!n||!t)return; tasks.push({name:n,time:t}); save(); renderTasks(); }
function renderTasks(){ let d=''; let tot=0; tasks.forEach((x,i)=>{ tot+=x.time; d+=`<li>${x.name} – ${x.time} min</li>`; }); document.getElementById('taskList').innerHTML=d; }
function render(){ let d=''; let sum=0; cart.forEach(a=>{ let tot=a.price*a.qty; sum+=tot; d+=`<li>${a.name}: ${a.qty} x ${a.price} = ${tot}</li>`; }); document.getElementById('cart').innerHTML=d; document.getElementById('sum').innerText=sum; }
function exportJSON(){ let data = {cart:cart,tasks:tasks}; let b=new Blob([JSON.stringify(data)],{type:'application/json'}); let u=URL.createObjectURL(b); let a=document.createElement('a'); a.href=u; a.download='kalkyl.json'; a.click(); }
function importJSON(e){ let f=e.target.files[0]; let r=new FileReader(); r.onload=()=>{ let j=JSON.parse(r.result); cart=j.cart; tasks=j.tasks; save(); render(); renderTasks(); }; r.readAsText(f); }
render(); renderTasks();
</script>
</body></html>
