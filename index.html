<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fiberkalkyl V4</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background:#f5f5f5;
    }

    header {
        background: #1a4fb3;
        color: white;
        padding: 15px;
        font-size: 22px;
        text-align: center;
    }

    nav {
        background: #e8e8e8;
        padding: 10px;
        display: flex;
        justify-content: space-around;
        border-bottom: 1px solid #ccc;
    }

    nav button {
        padding: 10px;
        border: none;
        background:#d9d9d9;
        border-radius: 5px;
        cursor:pointer;
    }

    main {
        padding: 20px;
    }

    .section {
        display:none;
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow:0 0 5px #ccc;
    }

    .section.active {
        display:block;
    }

    table {
        width:100%;
        border-collapse: collapse;
    }

    table th, table td {
        padding:10px;
        border-bottom:1px solid #ddd;
    }

    .btn {
        padding:10px 15px;
        background:#1a4fb3;
        color:white;
        border:none;
        border-radius:5px;
        cursor:pointer;
        margin-top:10px;
    }
</style>

js/app.js</script>
<script>
function show(tab){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
}

async function loadMaterials(){
    let res = await fetch('data/materials.json');
    let data = await res.json();
    let tbody = document.getElementById("materialRows");
    tbody.innerHTML = "";
    data.slice(0,30).forEach(m=>{
        tbody.innerHTML += `<tr>
            <td>${m.ename}</td>
            <td>${m.name}</td>
            <td>${m.price} kr</td>
        </tr>`;
    });
}

async function loadMoments(){
    let res = await fetch('data/moments.json');
    let data = await res.json();
    let tbody = document.getElementById("momentRows");
    tbody.innerHTML="";
    data.forEach(m=>{
        tbody.innerHTML += `<tr>
            <td>${m.name}</td>
            <td>${m.default_hours} h</td>
            <td>${m.category}</td>
        </tr>`;
    });
}

window.onload = ()=>{
    show('fiber'); 
    loadMaterials();
    loadMoments();
}
</script>
</head>

<body>

<header>Fiberkalkyl V4</header>

<nav>
    <button onclick="show('fiber')">Fiber</button>
    <button onclick="show('koppar')">Koppar</button>
    <button onclick="show('material')">Material</button>
    <button onclick="show('moment')">Moment</button>
    <button onclick="exportPDF()">PDF</button>
    <button onclick="exportExcel()">Excel</button>
</nav>

<main>

<!-- Fiber -->
<div id="fiber" class="section active">
    <h2>Fiberinstallation</h2>
    <p>Kommer att visa fiberkalkyl här.</p>
</div>

<!-- Koppar -->
<div id="koppar" class="section">
    <h2>Koppardata</h2>
    <p>Kommer att visa kopparkalkyl här.</p>
</div>

<!-- Materiallista -->
<div id="material" class="section">
    <h2>Material (exempel – första 30 av 300)</h2>
    <table>
        <thead>
            <tr>
                <th>E-nummer</th>
                <th>Artikel</th>
                <th>Pris</th>
            </tr>
        </thead>
        <tbody id="materialRows"></tbody>
    </table>
</div>

<!-- Momentlista -->
<div id="moment" class="section">
    <h2>Arbetsmoment</h2>
    <table>
        <thead>
            <tr>
                <th>Moment</th>
                <th>Standardtid</th>
                <th>Kategori</th>
            </tr>
        </thead>
        <tbody id="momentRows"></tbody>
    </table>
</div>

</main>

</body>
</html>
