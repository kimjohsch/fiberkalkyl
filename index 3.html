
<!DOCTYPE html>
<html>
<body>
<h2>Kalkylverktyg v5 – kategorier</h2>
<script>
let fiber = {"Kablar": [{"name": "OM4 12-fiberkabel", "price": 9.5, "unit": "m"}], "Skarvboxar": [{"name": "Skarvbox IP54 v\u00e4gg", "price": 490, "unit": "st"}]};
let copper = {"Kablar": [{"name": "Cat6 U/UTP installationskabel", "price": 4.9, "unit": "m"}], "Uttag": [{"name": "RJ45 moduluttag vit", "price": 29, "unit": "st"}]};
let active = fiber;
let cart = JSON.parse(localStorage.getItem('calc')||'[]');

function switchCalc(){ let v=document.getElementById('type').value; active = v==='fiber'?fiber:copper; renderCats(); renderCart(); }
function addItem(cat,index){ let item = active[cat][index]; let qty=parseFloat(prompt('Mängd ('+item.unit+')',1)); if(!qty) return; cart.push({name:item.name,price:item.price,unit:item.unit,qty:qty}); save(); renderCart(); }
function removeItem(i){ cart.splice(i,1); save(); renderCart(); }
function save(){ localStorage.setItem('calc',JSON.stringify(cart)); }
function renderCats(){ let d=''; for(let c in active){ d+=`<h3>${c}</h3><ul>`; active[c].forEach((a,i)=> d+=`<li>${a.name} – ${a.price} kr/${a.unit} <button onclick="addItem('${c}',${i})">Lägg till</button></li>`); d+='</ul>'; } document.getElementById('cats').innerHTML=d; }
function renderCart(){ let d=''; let sum=0; cart.forEach((a,i)=>{ let tot=a.price*a.qty; sum+=tot; d+=`<li>${a.name}: ${a.qty} ${a.unit} = ${tot} kr <button onclick="removeItem(${i})">X</button></li>`; }); document.getElementById('cart').innerHTML=d; document.getElementById('sum').innerText=sum+' kr'; }
</script>
<select id='type' onchange='switchCalc()'><option value='fiber'>Fiber</option><option value='copper'>Koppar</option></select>
<div id='cats'></div>
<h3>Kalkyl</h3>
<ul id='cart'></ul>
<h3>Total: <span id='sum'></span></h3>
<script>switchCalc();</script>
</body>
</html>
